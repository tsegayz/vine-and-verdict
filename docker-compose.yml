version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: vine-verdict-db
    environment:
      POSTGRES_USER: vine_admin
      POSTGRES_PASSWORD: secure_pass
      POSTGRES_DB: vine_verdict
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: